<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="https://kit.fontawesome.com/89d28f01ec.js"
      crossorigin="anonymous"
    ></script>

</head>
<body>

    <div class="content">
        <div class="menu">
            <!-- HOUSE -->
            <div class="superior">
                <div class="itemMenu">
                    <img src="assets/home.png" alt="">
                </div>
                <!-- GRAFICO -->
                <div class="itemMenu">
                    <img src="assets/activity.png" alt="">
                </div>
                <!-- CAMADAS -->
                <div class="itemMenu">
                    <img src="assets/layers.png" alt="">
                </div>
                <!-- CHECK -->
                <div class="itemMenu">
                    <img src="assets/check-mark.png" alt="">
                </div>
                <!-- BANDEIRA -->
                <div class="itemMenu">
                    <img src="assets/flag.png" alt="">
                </div>
                <!-- PERFIS -->
                <div class="itemMenu">
                    <img src="assets/group.png" alt="">
                </div>
            </div>

            <!-- LA EMBAIXO -->

            <div class="inferior">
                <!-- NAO SEI O QUE E -->
                <div class="itemMenu">
                    <img src="assets/gear (1).png" alt="">
                </div>
                <!-- CONFIGURAÇÂO -->
                <div class="itemMenu">
                    <img src="assets/gear.png" alt="">
                </div>
                <!-- LINHA DIVISORIA -->
                <hr>
                <!-- IMAGEM PERFIL -->
                <div class="itemMenu">
                    <img src="assets/user.png" alt="">
                </div>
            </div>
        </div>
        <div class="dashboard">
            <div class="headerDashboard">
                <h1>Balancete Anual</h1>
                
                <div class="buttonDash">
                    <button class="btnImport"><img src="assets/import.png" alt="">Import</button>
                    <button class="btnAddCostumer">+ Add Costumer</button>
                </div>
            </div>
            <div class="secondHeader">
                <p>Fundo de Reserva <img src="assets/three-dots.png" alt=""></p>
                <p>Linha do tempo <img src="assets/three-dots.png" alt=""></p>
            </div>
            <div class="grafico">
                <canvas id="myChart"></canvas>
            </div>              
        </div>
    </div>
    
</body>
</html>

<script>
    const labels = [
      'Jan',
      'Feb',
      'Mar',
      'Apr',
      'May',
      'Jun',
      'Jul',
      'Aug',
      'Sep',
      'Oct',
      'Nov',
      'Dec',
    ];
  
    const data = {
      labels: labels,
      datasets: [{
        label: 'Receitas',
        backgroundColor: 'rgb(255, 99, 132)',
        borderColor: 'rgb(255, 99, 132)',
        data: [30, 28, 33, 37, 34, 33, 36, 38, 39, 40, 42, 43, 0, 60],
      }],
        label: 'Despesas',
        backgroundColor: 'rgb(000, 000, 255)',
        borderColor: 'rgb(000, 000, 255)',
        data: [15, 14, 16, 19, 17, 16, 18, 19, 19, 20, 21, 22],
    };
  
    const config = {
      type: 'line',
      data: data,
      options: {}
    };
  </script>
<script>
    const myChart = new Chart(
      document.getElementById('myChart'),
      config
    );
  </script>
